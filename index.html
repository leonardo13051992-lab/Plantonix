<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2d4059">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="PLANTONIX - Sistema de Gestão de Escalas para Home Care">
    <title>PLANTONIX - Gestão de Escalas</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        /* ============================================
           PLANTONIX v5.0 - ESTILOS COMPLETOS
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #2d4059;
            --primary-light: #4a6a8a;
            --primary-dark: #1a2a3a;
            --primary-rgb: 45, 64, 89;
            --primary-gradient: linear-gradient(135deg, #2d4059, #4a6a8a);
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fc;
            --bg-tertiary: #f1f3f7;
            --text-primary: #1a2a3a;
            --text-secondary: #2d4059;
            --text-tertiary: #6b7a8f;
            --text-quaternary: #a0b0c4;
            --text-light: #ffffff;
            --border-light: #e8ecf2;
            --border-medium: #d0d8e0;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
            --shadow-xl: 0 20px 60px rgba(0,0,0,0.15);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 9999px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --header-height: 60px;
            --banner-height: 50px;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --admin-color: #6c5ce7;
            --colab-color: #22c55e;
        }

        [data-theme="dark"] {
            --bg-primary: #0f1923;
            --bg-secondary: #16222e;
            --bg-tertiary: #1e2d3d;
            --text-primary: #e8ecf2;
            --text-secondary: #c8d0db;
            --text-tertiary: #8a9aad;
            --text-quaternary: #5a6a7d;
            --border-light: #1e2d3d;
            --border-medium: #2d4059;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.5);
            --shadow-xl: 0 20px 60px rgba(0,0,0,0.6);
        }

        body {
            background: var(--bg-secondary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            overflow-x: hidden;
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
            padding-bottom: calc(var(--banner-height) + 20px);
        }

        .ad-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--banner-height);
            background: var(--bg-primary);
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 0 10px;
            transition: background var(--transition), border-color var(--transition);
        }

        .ad-banner .ad-placeholder {
            width: 100%;
            max-width: 320px;
            height: 40px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-quaternary);
            font-size: 11px;
            transition: background var(--transition), color var(--transition);
            cursor: pointer;
        }

        .ad-banner .ad-placeholder:hover {
            background: var(--border-medium);
        }

        #connectionStatus {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            padding: 6px 12px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            display: none;
        }

        /* ============================================
           TELA DE LOGIN / CADASTRO
           ============================================ */
        .login-screen {
            display: none;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-secondary);
            padding: 20px;
            width: 100%;
        }

        .login-screen.active {
            display: flex;
        }

        .login-box {
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            transition: background var(--transition);
            max-height: 95vh;
            overflow-y: auto;
        }

        .login-box .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .login-box .logo h1 {
            font-size: 32px;
            font-weight: 900;
            color: var(--text-primary);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .login-box .logo h1 span {
            color: var(--primary);
        }

        .login-box .logo p {
            color: var(--text-tertiary);
            font-size: 14px;
            margin-top: 4px;
        }

        .login-tabs {
            display: flex;
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 24px;
            border: 2px solid var(--border-light);
        }

        .login-tabs .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: var(--bg-primary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            color: var(--text-tertiary);
        }

        .login-tabs .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .login-tabs .tab-btn:active {
            transform: scale(0.96);
        }

        .profile-selector-login {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .profile-selector-login .profile-option {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--bg-primary);
        }

        .profile-selector-login .profile-option .profile-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }

        .profile-selector-login .profile-option .profile-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
        }

        .profile-selector-login .profile-option.selected-admin {
            border-color: var(--admin-color);
            background: rgba(108, 92, 231, 0.05);
        }

        .profile-selector-login .profile-option.selected-admin .profile-label {
            color: var(--admin-color);
        }

        .profile-selector-login .profile-option.selected-colab {
            border-color: var(--colab-color);
            background: rgba(34, 197, 94, 0.05);
        }

        .profile-selector-login .profile-option.selected-colab .profile-label {
            color: var(--colab-color);
        }

        .profile-selector-login .profile-option:active {
            transform: scale(0.96);
        }

        .login-box .form-group {
            margin-bottom: 16px;
        }

        .login-box .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .login-box .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .login-box .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(var(--primary-rgb, 45, 64, 89), 0.1);
        }

        .login-box .password-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-primary);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .login-box .password-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(var(--primary-rgb, 45, 64, 89), 0.1);
        }

        .login-box .password-wrapper input {
            border: none;
            flex: 1;
            padding: 12px 14px;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            box-shadow: none;
        }

        .login-box .password-wrapper input:focus {
            box-shadow: none;
        }

        .login-box .password-toggle {
            background: none;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-tertiary);
            transition: all var(--transition);
        }

        .login-box .password-toggle:hover {
            color: var(--text-primary);
        }

        .login-box .forgot-password {
            text-align: right;
            margin-top: -8px;
            margin-bottom: 16px;
        }

        .login-box .forgot-password a {
            font-size: 13px;
            color: var(--text-tertiary);
            text-decoration: none;
            cursor: pointer;
        }

        .login-box .forgot-password a:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .login-box .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            margin-top: 4px;
        }

        .login-box .btn-login:active {
            transform: scale(0.96);
        }

        .login-box .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-box .login-error {
            color: var(--danger);
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .login-box .login-success {
            color: var(--success);
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .login-box .login-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .login-box .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .login-box .login-footer a:hover {
            text-decoration: underline;
        }

        .company-fields {
            display: none;
        }

        .company-fields.show {
            display: block;
        }

        .invite-fields {
            display: none;
        }

        .invite-fields.show {
            display: block;
        }

        /* ============================================
           APP CONTAINER - SEPARAÇÃO DE PERFIS
           ============================================ */
        .app-container {
            max-width: 450px;
            width: 100%;
            min-height: 100vh;
            background: var(--bg-primary);
            box-shadow: var(--shadow-md);
            position: relative;
            padding: 0 16px 30px;
            display: none;
            flex-direction: column;
            transition: background var(--transition), border-color var(--transition);
            border-left: 4px solid var(--primary);
            margin: 0 auto;
        }

        .app-container.active {
            display: flex;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0 8px;
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            z-index: 10;
            border-bottom: 1px solid var(--border-light);
            transition: background var(--transition), border-color var(--transition);
            height: var(--header-height);
        }

        .menu-icon {
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            user-select: none;
            font-weight: 300;
            background: none;
            border: none;
            transition: transform 0.15s, color var(--transition);
            border-radius: var(--radius-full);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon:active {
            transform: scale(0.88);
            background: var(--bg-tertiary);
        }

        .app-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-primary);
            text-align: center;
            flex: 1;
            letter-spacing: -0.3px;
            transition: color var(--transition);
        }

        .app-title .sub {
            font-weight: 400;
            font-size: 10px;
            color: var(--text-tertiary);
            display: block;
            margin-top: 0px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color var(--transition);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-full);
            transition: background 0.15s, color var(--transition);
            color: var(--text-secondary);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:active {
            background: var(--bg-tertiary);
            transform: scale(0.92);
        }

        .logout-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-full);
            transition: background 0.15s, color var(--transition);
            color: var(--text-tertiary);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logout-btn:active {
            background: var(--bg-tertiary);
            transform: scale(0.92);
        }

        .profile-badge-app {
            display: inline-block;
            padding: 2px 12px;
            border-radius: var(--radius-full);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .profile-badge-app.admin {
            background: rgba(108, 92, 231, 0.15);
            color: var(--admin-color);
        }

        .profile-badge-app.colab {
            background: rgba(34, 197, 94, 0.15);
            color: var(--colab-color);
        }

        .panel-badge {
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            font-weight: 700;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .panel-badge.admin {
            background: rgba(108, 92, 231, 0.1);
            color: var(--admin-color);
            border: 1px solid rgba(108, 92, 231, 0.2);
        }

        .panel-badge.colab {
            background: rgba(34, 197, 94, 0.1);
            color: var(--colab-color);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .panel-badge .panel-icon {
            margin-right: 6px;
        }

        .menu-dropdown {
            display: none;
            position: absolute;
            top: 60px;
            left: 12px;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            padding: 8px 0;
            min-width: 220px;
            z-index: 50;
            border: 1px solid var(--border-light);
            transition: background var(--transition), border-color var(--transition);
        }

        .menu-dropdown.active {
            display: block;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .menu-dropdown .menu-item {
            width: 100%;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.15s, color var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            background: none;
            border: none;
            text-align: left;
        }

        .menu-dropdown .menu-item:active {
            background: var(--bg-tertiary);
        }

        .menu-dropdown .menu-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .menu-divider {
            height: 1px;
            background: var(--border-light);
            margin: 4px 16px;
        }

        .menu-dropdown .menu-item.danger {
            color: var(--danger);
        }

        .admin-menu-items {
            display: none;
        }

        .admin-menu-items.visible {
            display: block;
        }

        .colab-menu-items {
            display: none;
        }

        .colab-menu-items.visible {
            display: block;
        }

        .brand-area {
            text-align: center;
            padding: 12px 0 14px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-secondary);
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            margin: 0 -16px;
            padding-left: 16px;
            padding-right: 16px;
            transition: background var(--transition), border-color var(--transition);
        }

        .brand-name {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-primary);
            letter-spacing: 1.5px;
            transition: color var(--transition);
            text-transform: uppercase;
        }

        .brand-name .highlight {
            color: var(--primary);
            transition: color var(--transition);
        }

        .brand-subname {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-tertiary);
            letter-spacing: 0.5px;
            margin-top: 4px;
            transition: color var(--transition);
            cursor: pointer;
            min-height: 24px;
        }

        .brand-subname .edit-icon {
            font-size: 14px;
            opacity: 0.4;
            transition: opacity var(--transition);
        }

        .brand-subname:hover .edit-icon {
            opacity: 1;
        }

        .mode-badge {
            text-align: center;
            padding: 4px 0;
            font-size: 11px;
            font-weight: 600;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            transition: all var(--transition);
        }

        .mode-badge.admin {
            background: rgba(108, 92, 231, 0.1);
            color: var(--admin-color);
        }

        .mode-badge.colab {
            background: rgba(34, 197, 94, 0.1);
            color: var(--colab-color);
        }

        .cloud-badge {
            text-align: center;
            padding: 4px 0;
            font-size: 10px;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
        }

        .greeting-card {
            background: var(--primary-gradient);
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            margin: 12px 0 10px;
            color: white;
            box-shadow: 0 4px 20px rgba(var(--primary-rgb, 45, 64, 89), 0.25);
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .greeting-card::after {
            content: '';
            position: absolute;
            right: -40px;
            bottom: -40px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
        }

        .greeting-card .greeting-content {
            flex: 1;
            min-width: 0;
            position: relative;
            z-index: 1;
        }

        .greeting-card .greeting-text {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
            position: relative;
            z-index: 1;
        }

        .greeting-card .greeting-text .highlight-name {
            font-weight: 700;
            opacity: 1;
        }

        .greeting-card .greeting-sub {
            font-size: 11px;
            opacity: 0.85;
            font-weight: 400;
            position: relative;
            z-index: 1;
            margin-top: 1px;
        }

        .greeting-card .greeting-date {
            font-size: 10px;
            opacity: 0.7;
            font-weight: 400;
            position: relative;
            z-index: 1;
            margin-top: 2px;
        }

        .greeting-card .greeting-employee {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 3px;
            position: relative;
            z-index: 1;
        }

        .greeting-card .greeting-employee .employee-name {
            font-size: 13px;
            font-weight: 600;
            opacity: 0.95;
        }

        .greeting-card .greeting-employee .employee-function {
            font-size: 10px;
            opacity: 0.75;
            font-weight: 400;
            background: rgba(255,255,255,0.12);
            padding: 1px 10px;
            border-radius: var(--radius-full);
        }

        .greeting-card .greeting-employee .employee-tag {
            font-size: 9px;
            opacity: 0.8;
            font-weight: 500;
            background: rgba(255,255,255,0.15);
            padding: 1px 10px;
            border-radius: var(--radius-full);
        }

        .patient-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            margin: 0 0 10px 0;
            border: 2px solid var(--border-light);
            transition: all var(--transition);
            cursor: default;
            position: relative;
        }

        .patient-card.editable {
            cursor: pointer;
            border-color: var(--border-medium);
        }

        .patient-card.editable:active {
            transform: scale(0.98);
            border-color: var(--primary);
        }

        .patient-card .patient-label {
            font-size: 11px;
            font-weight: 600;
